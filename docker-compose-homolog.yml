version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dsmovie-postgres
    ports:
      - "${POSTGRES_PORT:-8281}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dsmovie_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_HUB_USERNAME:-felipeschirmann}/ds-movie:${IMAGE_TAG:-latest}
    container_name: dsmovie-app
    ports:
      - "${APP_PORT:-8280}:8080"
    environment:
      APP_PROFILE: ${APP_PROFILE:-homolog}
      DSMOVIE_DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-dsmovie_db}
      DSMOVIE_DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DSMOVIE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DSMOVIE_BACKEND_PORT: 8080
      DSMOVIE_FRONTEND_URL: ${DSMOVIE_FRONTEND_URL:-http://localhost:3000,https://site.dsmovie.felipeschirmann.dev.br}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
