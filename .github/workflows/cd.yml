name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  check-changes:
    name: Check for backend changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect Changes
        id: filter
        run: |
          if ! git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            echo "No parent commit found (initial commit). Triggering backend build."
            echo "backend=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Comparing HEAD with HEAD^..."
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Exclude markdown files (.md) from relevant code changes
          RELEVANT_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^(backend/|\.github/workflows/cd\.yml)' | grep -vE '\.md$' || true)
          
          if [ -n "$RELEVANT_CHANGES" ]; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "Relevant code changes detected (excluding markdown):"
            echo "$RELEVANT_CHANGES"
          else
            echo "backend=false" >> $GITHUB_OUTPUT
            echo "No relevant code changes detected (only documentation or non-backend files changed). Skipping build."
          fi

  build-and-package:
    name: Build and Package Application
    needs: check-changes
    runs-on: ubuntu-latest
    if: ${{ needs.check-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Compile and Package Application
        run: mvn -f backend/pom.xml -B clean package -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: backend/target/*.war

  publish-docker-and-deploy:
    name: Publish Docker Image and Deploy
    needs: [check-changes, build-and-package]
    runs-on: ubuntu-latest
    if: ${{ needs.check-changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set Short SHA
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "short_sha=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT
          else
            echo "short_sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: backend/target/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ds-movie:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/ds-movie:sha-${{ steps.vars.outputs.short_sha }}

      - name: Copy Nginx config via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "nginx/dsmovie.conf"
          target: "/tmp"
          strip_components: 1

      - name: Remotely Deploy to Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /home/${{ secrets.SSH_USERNAME }}/dsmovie
            cd /home/${{ secrets.SSH_USERNAME }}/dsmovie
            
            cat << 'EOF' > docker-compose-homolog.yml
            version: '3.8'
            services:
              db:
                image: postgres:15-alpine
                container_name: dsmovie-postgres
                ports:
                  - "${POSTGRES_PORT:-8281}:5432"
                environment:
                  POSTGRES_DB: ${POSTGRES_DB:-dsmovie_db}
                  POSTGRES_USER: ${POSTGRES_USER:-postgres}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
              app:
                image: ${DOCKER_HUB_USERNAME:-felipeschirmann}/ds-movie:${IMAGE_TAG:-latest}
                container_name: dsmovie-app
                ports:
                  - "${APP_PORT:-8280}:8080"
                environment:
                  APP_PROFILE: ${APP_PROFILE:-homolog}
                  DSMOVIE_DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-dsmovie_db}
                  DSMOVIE_DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
                  DSMOVIE_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
                  DSMOVIE_BACKEND_PORT: 8080
                  DSMOVIE_FRONTEND_URL: ${DSMOVIE_FRONTEND_URL:-http://localhost:3000}
                depends_on:
                  db:
                    condition: service_healthy
            volumes:
              postgres_data:
            EOF
            
            if [ -f .env.homolog ]; then
              sed -i '/^IMAGE_TAG=/d' .env.homolog
              sed -i '/^DOCKER_HUB_USERNAME=/d' .env.homolog
            fi
            echo "IMAGE_TAG=sha-${{ steps.vars.outputs.short_sha }}" >> .env.homolog
            echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" >> .env.homolog
            
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog pull
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog down -v
            docker compose -f docker-compose-homolog.yml --env-file .env.homolog up -d
            docker image prune -a -f
            
            sudo mv /tmp/dsmovie.conf /etc/nginx/conf.d/dsmovie.conf
            sudo nginx -t && sudo nginx -s reload
