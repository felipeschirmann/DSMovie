sonar.organization=felipeschirmann
sonar.projectKey=felipeschirmann_DSMovie
sonar.projectName=DSMovie
sonar.host.url=https://sonarcloud.io

# Define sources, tests and exclusions
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=backend/src/test/java/**/*.java,frontend/src/**/*.test.tsx,frontend/src/**/*.test.ts,frontend/src/setupTests.ts
sonar.exclusions=frontend/node_modules/**,frontend/build/**,**/target/**,frontend/src/**/*.test.tsx,frontend/src/**/*.test.ts,frontend/src/setupTests.ts

# Java specific configuration
sonar.java.binaries=backend/target/classes
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# Code coverage exclusions (excluding boilerplate java and non-testable CSS files)
sonar.coverage.exclusions=backend/src/main/java/com/devsuperior/dsmovie/config/**,backend/src/main/java/com/devsuperior/dsmovie/dto/**,backend/src/main/java/com/devsuperior/dsmovie/entities/**,backend/src/main/java/com/devsuperior/dsmovie/services/exceptions/**,backend/src/main/java/com/devsuperior/dsmovie/controllers/handlers/**,backend/src/main/java/com/devsuperior/dsmovie/DsmovieApplication.java,backend/src/main/java/com/devsuperior/dsmovie/ServletInitializer.java,frontend/src/**,**/*.css

# JavaScript/TypeScript coverage report path
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
